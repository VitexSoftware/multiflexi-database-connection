<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C5F8A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Database cylinder body -->
  <rect x="12" y="16" width="40" height="32" rx="2" fill="url(#dbGrad)" />
  <!-- Top ellipse -->
  <ellipse cx="32" cy="16" rx="20" ry="8" fill="#5BA3EC" />
  <!-- Bottom ellipse -->
  <ellipse cx="32" cy="48" rx="20" ry="8" fill="#2C5F8A" />
  <!-- Middle line 1 -->
  <ellipse cx="32" cy="27" rx="20" ry="5" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.4" />
  <!-- Middle line 2 -->
  <ellipse cx="32" cy="38" rx="20" ry="5" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.4" />
  <!-- Highlight on top -->
  <ellipse cx="32" cy="16" rx="16" ry="5" fill="#fff" opacity="0.15" />
  <!-- Connection plug icon -->
  <circle cx="50" cy="50" r="10" fill="#FFA726" stroke="#E65100" stroke-width="1.5" />
  <rect x="47" y="44" width="2" height="6" rx="1" fill="#fff" />
  <rect x="51" y="44" width="2" height="6" rx="1" fill="#fff" />
  <rect x="46" y="50" width="8" height="3" rx="1.5" fill="#fff" />
</svg>
